@(title: String)(content: Html)
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@title</title>

  <!-- SEO básico -->
  <meta name="description" content="Pokédex retro — explora todos los Pokémon con estética de consola clásica.">
  <meta name="theme-color" content="#cc2200">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="@title">
  <meta property="og:description" content="Pokédex retro — explora todos los Pokémon con estética de consola clásica.">
  <meta property="og:image" content="@routes.Assets.versioned("images/logo-pokebola.jpg")">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="@title">
  <meta name="twitter:description" content="Pokédex retro — explora todos los Pokémon con estética de consola clásica.">
  <meta name="twitter:image" content="@routes.Assets.versioned("images/logo-pokebola.jpg")">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="@routes.Assets.versioned("images/logo-pokebola.jpg")">
  <link rel="apple-touch-icon" href="@routes.Assets.versioned("images/logo-pokebola.jpg")">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="@routes.Assets.versioned("stylesheets/pokedex.css")">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-dot red"></span>
        <span class="logo-dot yellow"></span>
        <span class="logo-dot green"></span>
      </div>
      <h1 class="site-title">POKÉDEX</h1>
      <div class="header-badge">RETRO</div>
    </div>
  </header>

  <main class="site-main">
    @content
  </main>

  <footer class="site-footer">
    <p>© GAME FREAK — POWERED BY POKEAPI</p>
  </footer>
</body>
</html>
