stryker4s {
  # Dialecto Scala 3 requerido para parsear la sintaxis de indentación (`:` sin llaves)
  scala-dialect = "Scala3"

  # Solo mutar código de negocio: dominio, aplicación e infraestructura de cache/adapters/client.
  # Se excluyen: codecs Circe (solo mapeo de campos), Swagger (HTML estático),
  # Main (wiring), middleware de logging (side effects puros), ResourceRegistry (lista fija).
  mutate = [
    "src/main/scala/com/pokeapp/domain/**/*.scala",
    "src/main/scala/com/pokeapp/application/**/*.scala",
    "src/main/scala/com/pokeapp/infrastructure/cache/*.scala",
    "src/main/scala/com/pokeapp/infrastructure/adapter/*.scala",
    "src/main/scala/com/pokeapp/infrastructure/http/client/*.scala",
    "src/main/scala/com/pokeapp/api/routes/RouteSupport.scala",
    "src/main/scala/com/pokeapp/api/routes/PokemonRoutes.scala",
    "src/main/scala/com/pokeapp/api/routes/TypedResourceRoutes.scala",
    "src/main/scala/com/pokeapp/api/dto/ApiResponse.scala"
  ]

  reporters = ["console", "html"]

  base-dir = "."
}
